<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diotronic Component Browser</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0e11;
    --surface: #16181d;
    --surface2: #1e2027;
    --border: #2a2d36;
    --accent-cap: #00d4aa;
    --accent-res: #ff6b35;
    --accent-cap-dim: rgba(0,212,170,0.12);
    --accent-res-dim: rgba(255,107,53,0.12);
    --text: #e8eaf0;
    --text-dim: #6b7280;
    --text-mid: #9ca3af;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 24px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent-cap); }
  .logo .r { color: var(--accent-res); }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .main {
    display: flex;
    height: calc(100vh - 73px);
  }
  /* SIDEBAR */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .tab-switch {
    display: flex;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 3px;
    gap: 2px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.2s;
    background: transparent;
    color: var(--text-dim);
  }
  .tab-btn.active-cap { background: var(--accent-cap-dim); color: var(--accent-cap); }
  .tab-btn.active-res { background: var(--accent-res-dim); color: var(--accent-res); }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .search-box {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent-cap); }
  .search-box.res:focus { border-color: var(--accent-res); }
  .filter-group { display: flex; flex-direction: column; gap: 8px; }
  .filter-row { display: flex; gap: 6px; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text-mid); width: 28px; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .range-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    width: 0;
    transition: border-color 0.2s;
  }
  .range-input:focus { border-color: var(--accent-cap); }
  .range-input.res:focus { border-color: var(--accent-res); }
  .range-input::placeholder { color: var(--text-dim); }
  .unit-hint { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; text-align: center; margin-top: 2px; }
  select.filter-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  .sort-group { display: flex; flex-direction: column; gap: 6px; }
  .sort-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    color: var(--text-mid);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.15s;
  }
  .sort-btn:hover { border-color: var(--accent-cap); color: var(--text); }
  .sort-btn.res:hover { border-color: var(--accent-res); }
  .sort-btn.active-cap { background: var(--accent-cap-dim); border-color: var(--accent-cap); color: var(--accent-cap); }
  .sort-btn.active-res { background: var(--accent-res-dim); border-color: var(--accent-res); color: var(--accent-res); }
  .sort-arrow { font-size: 14px; }
  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #555; color: var(--text); }

  /* CONTENT */
  .content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .content-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .count-badge strong { color: var(--accent-cap); }
  .count-badge.res strong { color: var(--accent-res); }
  .table-wrap {
    flex: 1;
    overflow-y: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 10px 16px;
    text-align: left;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid rgba(42,45,54,0.5);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:hover { background: var(--surface2); }
  td {
    padding: 9px 16px;
    font-size: 13px;
    vertical-align: middle;
  }
  .td-name {
    font-size: 12px;
    max-width: 300px;
  }
  .name-text {
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }
  .td-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    white-space: nowrap;
  }
  .val-cap { color: var(--accent-cap); }
  .val-res { color: var(--accent-res); }
  .val-voltage { color: #a78bfa; }
  .val-power { color: #fbbf24; }
  .td-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .td-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-mid);
    white-space: nowrap;
  }
  .link-btn {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .link-btn:hover { border-color: var(--accent-cap); color: var(--accent-cap); }
  .link-btn.res:hover { border-color: var(--accent-res); color: var(--accent-res); }
  .no-results {
    padding: 60px 32px;
    text-align: center;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">diо<span>C</span>·<span class="r">R</span> browser</div>
    <div class="subtitle">DIOTRONIC COMPONENT CATALOG</div>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <!-- Tab switch -->
    <div class="tab-switch">
      <button class="tab-btn active-cap" id="tab-cap" onclick="switchTab('cap')">⚡ Capacitors</button>
      <button class="tab-btn" id="tab-res" onclick="switchTab('res')">〰 Resistors</button>
    </div>

    <!-- Search -->
    <div>
      <div class="section-label">Search</div>
      <input class="search-box" id="search" type="text" placeholder="Filter by name…" oninput="applyFilters()">
    </div>

    <!-- Category filter -->
    <div>
      <div class="section-label">Category</div>
      <select class="filter-select" id="cat-filter" onchange="applyFilters()">
        <option value="">All categories</option>
      </select>
    </div>

    <!-- Value range -->
    <div id="cap-filters">
      <div class="section-label">Capacitance Range</div>
      <div class="filter-group">
        <div class="filter-row">
          <span class="filter-label">Min</span>
          <input class="range-input" id="cap-min" type="text" placeholder="e.g. 10nF" oninput="applyFilters()">
        </div>
        <div class="filter-row">
          <span class="filter-label">Max</span>
          <input class="range-input" id="cap-max" type="text" placeholder="e.g. 100µF" oninput="applyFilters()">
        </div>
        <div class="unit-hint">pF · nF · µF/UF/MF · mF</div>
      </div>
      <br>
      <div class="section-label">Voltage Range</div>
      <div class="filter-group">
        <div class="filter-row">
          <span class="filter-label">Min</span>
          <input class="range-input" id="volt-min" type="text" placeholder="e.g. 50V" oninput="applyFilters()">
        </div>
        <div class="filter-row">
          <span class="filter-label">Max</span>
          <input class="range-input" id="volt-max" type="text" placeholder="e.g. 400V" oninput="applyFilters()">
        </div>
        <div class="unit-hint">V (enter number or e.g. 250V)</div>
      </div>
    </div>

    <div id="res-filters" style="display:none">
      <div class="section-label">Resistance Range</div>
      <div class="filter-group">
        <div class="filter-row">
          <span class="filter-label">Min</span>
          <input class="range-input res" id="res-min" type="text" placeholder="e.g. 1K" oninput="applyFilters()">
        </div>
        <div class="filter-row">
          <span class="filter-label">Max</span>
          <input class="range-input res" id="res-max" type="text" placeholder="e.g. 10M" oninput="applyFilters()">
        </div>
        <div class="unit-hint">Ω · K (kΩ) · M (MΩ)</div>
      </div>
      <br>
      <div class="section-label">Power Range</div>
      <div class="filter-group">
        <div class="filter-row">
          <span class="filter-label">Min</span>
          <input class="range-input res" id="pow-min" type="text" placeholder="e.g. 0.25" oninput="applyFilters()">
        </div>
        <div class="filter-row">
          <span class="filter-label">Max</span>
          <input class="range-input res" id="pow-max" type="text" placeholder="e.g. 10" oninput="applyFilters()">
        </div>
        <div class="unit-hint">W (enter number)</div>
      </div>
    </div>

    <!-- Sort -->
    <div>
      <div class="section-label">Sort by</div>
      <div class="sort-group" id="sort-group"></div>
    </div>

    <button class="reset-btn" onclick="resetFilters()">↺ Reset all filters</button>
  </div>

  <div class="content">
    <div class="content-header">
      <div class="count-badge" id="count-badge">Loading…</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="no-results" class="no-results" style="display:none">No components match your filters.</div>
    </div>
  </div>
</div>

a9","power":"50W","price":"5,65 \u20ac","url":"https://diotronic.com/met\u00e1lica-de-50w/9723-resist-metalica-6-8-ohms-50w"},{"category":"1547-met%C3%A1lica-de-50w","name":"RESISTENCIA METALICA 3.9\u03a9 \u00a9 50W ARCOL","resistance":"3.9\u03a9","power":"50W","price":"5,55 \u20ac","url":"https://diotronic.com/met\u00e1lica-de-50w/9733-resistencia-3-9-ohms-50w"},{"category":"1547-met%C3%A1lica-de-50w","name":"RESISTENCIA METALICA 1.5\u03a9 \u00a9 50W ARCOL","resistance":"1.5\u03a9","power":"50W","price":"5,65 \u20ac","url":"https://diotronic.com/met\u00e1lica-de-50w/9741-resist-metalica-1-5-ohms-50w"},{"category":"1547-met%C3%A1lica-de-50w","name":"RESISTENCIA METALICA 1\u03a9 \u00a9 50W ARCOL","resistance":"1\u03a9","power":"50W","price":"5,65 \u20ac","url":"https://diotronic.com/met\u00e1lica-de-50w/9742-resist-metalica-1-ohm-50w"},{"category":"1547-met%C3%A1lica-de-50w","name":"RESISTENCIA METALICA 0.68\u03a9 \u00a9 50W","resistance":"0.68\u03a9","power":"50W","price":"5,85 \u20ac","url":"https://diotronic.com/met\u00e1lica-de-50w/9636-resist-metalica-0-68-ohms-50w"},{"category":"1547-met%C3%A1lica-de-50w","name":"RESISTENCIA METALICA 0.15\u03a9 \u00a9 50W ARCOL","resistance":"0.15\u03a9","power":"50W","price":"5,81 \u20ac","url":"https://diotronic.com/met\u00e1lica-de-50w/9718-resist-metalica-0-15-ohms-50w"},{"category":"1547-met%C3%A1lica-de-50w","name":"RESISTENCIA METALICA 0.1\u03a9 \u00a9 50W ARCOL","resistance":"0.1\u03a9","power":"50W","price":"5,81 \u20ac","url":"https://diotronic.com/met\u00e1lica-de-50w/9722-resist-metalica-0-1-ohms-50w"}];

let currentTab = 'cap';
let sortKey = null;
let sortDir = 1;

// ── Unit parsers ──────────────────────────────────────────────────────────────

function parseCapacitance(str) {
  if (!str || str.trim() === '') return null;
  str = str.trim().toUpperCase().replace(/\s+/g, '');
  // µF written as UF or MF (micro, not milli/mega — context in electronics)
  // pF, nF, µF, mF, F
  let m;
  if ((m = str.match(/^([0-9.]+)\s*PF$/i)))  return parseFloat(m[1]) * 1e-12;
  if ((m = str.match(/^([0-9.]+)\s*NF$/i)))  return parseFloat(m[1]) * 1e-9;
  if ((m = str.match(/^([0-9.]+)\s*[Uµ]F$/i))) return parseFloat(m[1]) * 1e-6;
  if ((m = str.match(/^([0-9.]+)\s*MF$/i)))  return parseFloat(m[1]) * 1e-6; // "MF" in this catalog means µF
  if ((m = str.match(/^([0-9.]+)\s*MFF$/i))) return parseFloat(m[1]) * 1e-3; // milli-farad (rare)
  if ((m = str.match(/^([0-9.]+)\s*F$/i)))   return parseFloat(m[1]);
  return null;
}

function parseVoltage(str) {
  if (!str || str.trim() === '') return null;
  const m = str.trim().match(/([0-9.]+)/);
  return m ? parseFloat(m[1]) : null;
}

function parseResistance(str) {
  if (!str || str.trim() === '') return null;
  str = str.trim().toUpperCase().replace(/\s+/g, '').replace('OHM','').replace('Ω','');
  let m;
  if ((m = str.match(/^([0-9.]+)\s*M$/)))  return parseFloat(m[1]) * 1e6;
  if ((m = str.match(/^([0-9.]+)\s*K$/)))  return parseFloat(m[1]) * 1e3;
  if ((m = str.match(/^([0-9.]+)$/)))       return parseFloat(m[1]);
  return null;
}

function parsePower(str) {
  if (!str || str.trim() === '') return null;
  const m = str.trim().match(/([0-9.]+)/);
  return m ? parseFloat(m[1]) : null;
}

function formatPower(str) {
  if (!str || str.trim() === '') return '—';
  const fractions = { '4W': '¼W', '2W': '½W', '6W': '⅙W' };
  if (fractions[str.trim()]) return fractions[str.trim()];
  return str;
}

function parsePrice(str) {
  if (!str) return null;
  return parseFloat(str.replace(',','.').replace(/[^0-9.]/g,''));
}

// Friendly display
function formatCapacitance(str) {
  const v = parseCapacitance(str);
  if (v === null) return str || '—';
  if (v < 1e-9)  return (v / 1e-12).toPrecision(4).replace(/\.?0+$/, '') + ' pF';
  if (v < 1e-6)  return (v / 1e-9).toPrecision(4).replace(/\.?0+$/, '') + ' nF';
  if (v < 1e-3)  return (v / 1e-6).toPrecision(4).replace(/\.?0+$/, '') + ' µF';
  return (v / 1e-3).toPrecision(4).replace(/\.?0+$/, '') + ' mF';
}

function formatResistance(str) {
  const v = parseResistance(str);
  if (v === null) return str || '—';
  if (v >= 1e6)  return (v / 1e6).toPrecision(4).replace(/\.?0+$/, '') + ' MΩ';
  if (v >= 1e3)  return (v / 1e3).toPrecision(4).replace(/\.?0+$/, '') + ' kΩ';
  return v.toPrecision(4).replace(/\.?0+$/, '') + ' Ω';
}

function formatCategory(cat) {
  return cat.replace(/-/g,'·').replace(/%C3%B3/g,'o').replace(/%C3%A1/g,'a').replace(/^\d+-/,'');
}

// ── State ─────────────────────────────────────────────────────────────────────

function getDataset() { return currentTab === 'cap' ? CAPS : RESISTORS; }

function switchTab(tab) {
  currentTab = tab;
  sortKey = null; sortDir = 1;
  document.getElementById('tab-cap').className = 'tab-btn' + (tab==='cap' ? ' active-cap' : '');
  document.getElementById('tab-res').className = 'tab-btn' + (tab==='res' ? ' active-res' : '');
  document.getElementById('cap-filters').style.display = tab==='cap' ? '' : 'none';
  document.getElementById('res-filters').style.display = tab==='res' ? '' : 'none';
  document.getElementById('search').className = 'search-box' + (tab==='res' ? ' res' : '');
  buildCategoryOptions();
  buildSortButtons();
  applyFilters();
}

function buildCategoryOptions() {
  const sel = document.getElementById('cat-filter');
  const cats = [...new Set(getDataset().map(r => r.category))].sort();
  sel.innerHTML = '<option value="">All categories</option>' + 
    cats.map(c => `<option value="${c}">${formatCategory(c)}</option>`).join('');
}

function buildSortButtons() {
  const container = document.getElementById('sort-group');
  const isCap = currentTab === 'cap';
  const buttons = isCap
    ? [['name','Name'],['capacitance','Capacitance'],['voltage','Voltage'],['price','Price']]
    : [['name','Name'],['resistance','Resistance'],['power','Power'],['price','Price']];
  container.innerHTML = buttons.map(([k,label]) => `
    <button class="sort-btn ${isCap ? '' : 'res'}" id="sort-${k}" onclick="setSort('${k}')">
      ${label} <span class="sort-arrow" id="arrow-${k}">↕</span>
    </button>
  `).join('');
}

function setSort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  // Update arrows
  ['name','capacitance','voltage','resistance','power','price'].forEach(k => {
    const a = document.getElementById('arrow-'+k);
    const b = document.getElementById('sort-'+k);
    if (!a) return;
    const isCap = currentTab === 'cap';
    if (k === sortKey) {
      a.textContent = sortDir === 1 ? '↑' : '↓';
      b.className = 'sort-btn ' + (isCap ? 'active-cap' : 'res active-res');
    } else {
      a.textContent = '↕';
      b.className = 'sort-btn ' + (isCap ? '' : 'res');
    }
  });
  applyFilters();
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('cat-filter').value = '';
  ['cap-min','cap-max','volt-min','volt-max','res-min','res-max','pow-min','pow-max'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  sortKey = null; sortDir = 1;
  buildSortButtons();
  applyFilters();
}

function applyFilters() {
  const data = getDataset();
  const search = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const isCap = currentTab === 'cap';

  let filtered = data.filter(row => {
    if (search && !row.name.toLowerCase().includes(search)) return false;
    if (cat && row.category !== cat) return false;

    if (isCap) {
      const capMin = parseCapacitance(document.getElementById('cap-min').value);
      const capMax = parseCapacitance(document.getElementById('cap-max').value);
      const voltMin = parseVoltage(document.getElementById('volt-min').value);
      const voltMax = parseVoltage(document.getElementById('volt-max').value);
      const cap = parseCapacitance(row.capacitance);
      const volt = parseVoltage(row.voltage);
      if (capMin !== null && (cap === null || cap < capMin)) return false;
      if (capMax !== null && (cap === null || cap > capMax)) return false;
      if (voltMin !== null && (volt === null || volt < voltMin)) return false;
      if (voltMax !== null && (volt === null || volt > voltMax)) return false;
    } else {
      const resMin = parseResistance(document.getElementById('res-min').value);
      const resMax = parseResistance(document.getElementById('res-max').value);
      const powMin = parsePower(document.getElementById('pow-min').value);
      const powMax = parsePower(document.getElementById('pow-max').value);
      const res = parseResistance(row.resistance);
      const pow = parsePower(row.power);
      if (resMin !== null && (res === null || res < resMin)) return false;
      if (resMax !== null && (res === null || res > resMax)) return false;
      if (powMin !== null && (pow === null || pow < powMin)) return false;
      if (powMax !== null && (pow === null || pow > powMax)) return false;
    }
    return true;
  });

  // Sort
  if (sortKey) {
    filtered.sort((a, b) => {
      let va, vb;
      if (sortKey === 'name') { va = a.name; vb = b.name; return sortDir * va.localeCompare(vb); }
      if (sortKey === 'capacitance') { va = parseCapacitance(a.capacitance) ?? -Infinity; vb = parseCapacitance(b.capacitance) ?? -Infinity; }
      if (sortKey === 'voltage') { va = parseVoltage(a.voltage) ?? -Infinity; vb = parseVoltage(b.voltage) ?? -Infinity; }
      if (sortKey === 'resistance') { va = parseResistance(a.resistance) ?? -Infinity; vb = parseResistance(b.resistance) ?? -Infinity; }
      if (sortKey === 'power') { va = parsePower(a.power) ?? -Infinity; vb = parsePower(b.power) ?? -Infinity; }
      if (sortKey === 'price') { va = parsePrice(a.price) ?? -Infinity; vb = parsePrice(b.price) ?? -Infinity; }
      return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
    });
  }

  renderTable(filtered);
}

function renderTable(rows) {
  const isCap = currentTab === 'cap';
  const head = document.getElementById('table-head');
  const body = document.getElementById('table-body');
  const noRes = document.getElementById('no-results');
  const badge = document.getElementById('count-badge');

  badge.className = 'count-badge' + (isCap ? '' : ' res');
  badge.innerHTML = `<strong>${rows.length}</strong> / ${getDataset().length} components`;

  if (isCap) {
    head.innerHTML = `<tr>
      <th>Name</th>
      <th>Capacitance</th>
      <th>Voltage</th>
      <th>Category</th>
      <th>Price</th>
      <th></th>
    </tr>`;
  } else {
    head.innerHTML = `<tr>
      <th>Name</th>
      <th>Resistance</th>
      <th>Power</th>
      <th>Category</th>
      <th>Price</th>
      <th></th>
    </tr>`;
  }

  if (rows.length === 0) {
    body.innerHTML = '';
    noRes.style.display = '';
    return;
  }
  noRes.style.display = 'none';

  // Render in chunks for performance
  const CHUNK = 200;
  let html = '';
  const slice = rows.slice(0, CHUNK);
  for (const row of slice) {
    if (isCap) {
      html += `<tr onclick="window.open('${row.url}','_blank')">
        <td class="td-name"><span class="name-text" title="${row.name}">${row.name}</span></td>
        <td class="td-value val-cap">${formatCapacitance(row.capacitance)}</td>
        <td class="td-value val-voltage">${row.voltage || '—'}</td>
        <td class="td-cat">${formatCategory(row.category)}</td>
        <td class="td-price">${row.price}</td>
        <td><a class="link-btn" href="${row.url}" target="_blank" onclick="event.stopPropagation()">→</a></td>
      </tr>`;
    } else {
      html += `<tr onclick="window.open('${row.url}','_blank')">
        <td class="td-name"><span class="name-text" title="${row.name}">${row.name}</span></td>
        <td class="td-value val-res">${formatResistance(row.resistance)}</td>
        <td class="td-value val-power">${formatPower(row.power)}</td>
        <td class="td-cat">${formatCategory(row.category)}</td>
        <td class="td-price">${row.price}</td>
        <td><a class="link-btn res" href="${row.url}" target="_blank" onclick="event.stopPropagation()">→</a></td>
      </tr>`;
    }
  }
  body.innerHTML = html;

  // Load rest lazily
  if (rows.length > CHUNK) {
    setTimeout(() => {
      let rest = '';
      for (const row of rows.slice(CHUNK)) {
        if (isCap) {
          rest += `<tr onclick="window.open('${row.url}','_blank')">
            <td class="td-name"><span class="name-text" title="${row.name}">${row.name}</span></td>
            <td class="td-value val-cap">${formatCapacitance(row.capacitance)}</td>
            <td class="td-value val-voltage">${row.voltage || '—'}</td>
            <td class="td-cat">${formatCategory(row.category)}</td>
            <td class="td-price">${row.price}</td>
            <td><a class="link-btn" href="${row.url}" target="_blank" onclick="event.stopPropagation()">→</a></td>
          </tr>`;
        } else {
          rest += `<tr onclick="window.open('${row.url}','_blank')">
            <td class="td-name"><span class="name-text" title="${row.name}">${row.name}</span></td>
            <td class="td-value val-res">${formatResistance(row.resistance)}</td>
            <td class="td-value val-power">${formatPower(row.power)}</td>
            <td class="td-cat">${formatCategory(row.category)}</td>
            <td class="td-price">${row.price}</td>
            <td><a class="link-btn res" href="${row.url}" target="_blank" onclick="event.stopPropagation()">→</a></td>
          </tr>`;
        }
      }
      body.innerHTML += rest;
    }, 50);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildCategoryOptions();
buildSortButtons();
applyFilters();
</script>
